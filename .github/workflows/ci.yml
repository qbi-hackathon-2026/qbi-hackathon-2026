name: CI

# Read-only checks. Runs on PRs (including from forks) and on pushes to main.
# This workflow has NO access to secrets and only read permission on the repo,
# so it is safe to run on untrusted pull requests. Deployment lives in a
# separate workflow that runs only on push to main (after a maintainer merges).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Engine tests (no network)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trimprot
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (Python 3.12)
        run: uv sync --extra dev --python 3.12

      - name: Run tests (excluding network-dependent tests)
        run: uv run pytest -m "not network" -q
